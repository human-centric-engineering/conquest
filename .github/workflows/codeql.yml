name: CodeQL

# Static application security testing (SAST). Findings land in the repo's
# Security → Code scanning tab. Runs on every push/PR to main plus a weekly
# cron so newly published CodeQL queries catch latent issues without a code
# change. JavaScript/TypeScript is interpreted, so no build step is needed
# (build-mode: none).

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '27 3 * * 1' # Mondays 03:27 UTC

permissions:
  contents: read

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    # CARRIED SUNRISE OVERRIDE (pending-upstream): CodeQL uploads to GitHub code
    # scanning, which needs Advanced Security — free on public repos, paid on
    # private. ConQuest is a private fork without GHAS, so the upload fails. Skip
    # on private repos; also skip the weekly cron (nothing to upload to). The
    # schedule-exclusion is the rough edge to resolve before proposing this
    # upstream. Tracked: .context/application/development-plan.md → "Carried
    # Sunrise patches".
    if: ${{ github.event_name != 'schedule' && !github.event.repository.private }}
    runs-on: ubuntu-latest
    permissions:
      security-events: write # upload results to code scanning
      actions: read
      contents: read
    strategy:
      fail-fast: false
      matrix:
        language: ['javascript-typescript']

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: ${{ matrix.language }}
          build-mode: none
          queries: security-extended

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: '/language:${{ matrix.language }}'
