name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: read

# CARRIED SUNRISE OVERRIDE (pending-upstream): cancel superseded runs. At AI
# pace we push fixups rapidly; without this, runs stack and burn the private
# repo's limited free Actions minutes. Cancel in-progress runs for the same PR;
# never cancel main (those are the post-merge record).
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      code: ${{ steps.filter.outputs.code }}
      docker: ${{ steps.filter.outputs.docker }}
    steps:
      - name: Check for code changes
        id: filter
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            CHANGED=$(gh pr view ${{ github.event.pull_request.number }} --repo ${{ github.repository }} --json files --jq '.files[].path')
          else
            CHANGED=$(gh api repos/${{ github.repository }}/commits/${{ github.sha }} --jq '.files[].filename')
          fi

          echo "Changed files:"
          echo "$CHANGED"

          # CODE   — anything that isn't docs-only (gates validate + docker)
          # DOCKER — files that can change the production image (gates the
          #          docker job on PRs; on main it always runs as a merge gate)
          CODE=false
          DOCKER=false
          while IFS= read -r file; do
            [[ -z "$file" ]] && continue
            case "$file" in
              Dockerfile | .dockerignore | package.json | package-lock.json | next.config.js | next.config.mjs | next.config.ts)
                DOCKER=true
                echo "Docker-relevant change detected: $file"
                ;;
            esac
            [[ "$file" == *.md ]] && continue
            [[ "$file" == .context/* ]] && continue
            [[ "$file" == .instructions/* ]] && continue
            [[ "$file" == LICENSE ]] && continue
            CODE=true
            echo "Code change detected: $file"
          done <<< "$CHANGED"

          echo "code=$CODE" >> "$GITHUB_OUTPUT"
          echo "docker=$DOCKER" >> "$GITHUB_OUTPUT"

  validate:
    name: Validate
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.code == 'true'

    # Postgres service exercises migrations and seeds against a real DB so
    # broken migrations / seed units fail CI at PR time. pgvector image
    # matches production so the vector extension is available.
    services:
      postgres:
        image: pgvector/pgvector:pg15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: sunrise_ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    # Environment variables needed for Prisma generate (postinstall), migrations, seeds, and build
    env:
      DATABASE_URL: 'postgresql://postgres:postgres@localhost:5432/sunrise_ci'
      BETTER_AUTH_SECRET: 'ci-build-secret-not-for-production-use'
      BETTER_AUTH_URL: 'http://localhost:3000'
      NEXT_PUBLIC_APP_URL: 'http://localhost:3000'
      # CARRIED SUNRISE OVERRIDE (pending-upstream): private-repo runners are
      # smaller (2-core/7GB) than the public-repo runners Sunrise's CI assumes
      # (4-core/16GB), so Node's default heap caps near ~2GB and `tsc` /
      # `next build` OOM (exit 134). Raise the heap until Sunrise ships a
      # runner-agnostic fix. Tracked: .context/application/development-plan.md
      # → "Carried Sunrise patches".
      NODE_OPTIONS: '--max-old-space-size=5120'

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          # Full history so `vitest --changed` can diff against the PR base.
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'

      # CARRIED SUNRISE OVERRIDE (pending-upstream): persist warm build caches
      # across runs. `setup-node` only caches the npm download dir, not these.
      #   - .next/cache         → Next.js build cache + the ESLint cache
      #                           (lint already writes to .next/cache/eslint/)
      #   - tsconfig.tsbuildinfo → incremental `tsc` (tsconfig has
      #                           incremental:true; cold every run without this)
      # Cold first run seeds the cache; subsequent runs are much faster.
      - name: Cache build artifacts (Next.js / ESLint / tsc-incremental)
        uses: actions/cache@v4
        with:
          path: |
            .next/cache
            tsconfig.tsbuildinfo
          key: build-cache-${{ runner.os }}-${{ hashFiles('package-lock.json') }}-${{ github.sha }}
          restore-keys: |
            build-cache-${{ runner.os }}-${{ hashFiles('package-lock.json') }}-
            build-cache-${{ runner.os }}-

      - name: Install dependencies
        run: npm ci

      - name: Apply database migrations
        run: npm run db:migrate:deploy

      - name: Run seeds
        run: npm run db:seed

      - name: Type check
        run: npm run type-check

      - name: Lint
        run: npm run lint

      - name: Format check
        run: npm run format:check

      # CARRIED SUNRISE OVERRIDE (pending-upstream): on a PR, run only the tests
      # affected by the diff (fast iteration loop); the full 973-file suite runs
      # on push to main as the merge gate, so nothing merges unverified. Uses the
      # PR base SHA (available thanks to fetch-depth: 0 above).
      - name: Run tests
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            echo "PR — running tests affected by the diff (full suite runs on merge to main)"
            # --passWithNoTests: a diff that touches no test-related files (e.g.
            # CI config or docs-adjacent code) is a valid pass, not a failure.
            npx vitest run --changed ${{ github.event.pull_request.base.sha }} --passWithNoTests
          else
            echo "Push to main — running the full test suite"
            npx vitest run
          fi

      # Verifies the DB-enforced erasure behavior (cascade / set-null / PII
      # scrub) that the Prisma-mocked vitest suite cannot. Uses this job's
      # Postgres service + applied migrations; invoked directly (not the
      # smoke:erasure npm script, which loads .env.local — absent in CI).
      # The script skips cleanly if no DB is reachable.
      - name: Smoke — account erasure (real DB)
        run: npx tsx scripts/smoke/erasure.ts

      - name: Build
        run: npm run build

  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: changes
    # CARRIED SUNRISE OVERRIDE (pending-upstream): decoupled from `validate` so
    # it runs in parallel (a Dockerfile/image break surfaces immediately, not
    # after the long validate job). To conserve the private repo's free minutes,
    # on PRs it runs only when Docker-relevant files change; on push to main it
    # always runs as the production-image merge gate.
    if: >-
      needs.changes.outputs.code == 'true' &&
      (github.event_name == 'push' || needs.changes.outputs.docker == 'true')

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build Docker image
        uses: docker/build-push-action@v7
        with:
          context: .
          push: false
          tags: sunrise:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            DATABASE_URL=postgresql://postgres:postgres@localhost:5432/sunrise
            BETTER_AUTH_URL=http://localhost:3000
            BETTER_AUTH_SECRET=ci-build-secret-not-for-production-use
            NEXT_PUBLIC_APP_URL=http://localhost:3000

  # Gate job for branch protection - always runs and reports success
  ci-status:
    name: CI Status
    runs-on: ubuntu-latest
    needs: [validate, docker]
    if: always()
    steps:
      - name: Check CI result
        run: |
          if [[ "${{ needs.validate.result }}" == "failure" || "${{ needs.docker.result }}" == "failure" ]]; then
            echo "CI failed"
            exit 1
          fi
          echo "CI passed (jobs succeeded or were skipped for docs-only / non-docker changes)"
