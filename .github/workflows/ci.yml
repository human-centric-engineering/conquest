name: CI

# TIER-2 EXPERIMENT (parallel jobs + 4-way test sharding). Measures wall-clock
# vs billed-minutes against the Tier-1 serial pipeline. The `test` job is forced
# to the FULL suite here so we can benchmark sharding on a PR; the production
# design would keep --changed on PRs and shard only the full-suite/main path.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      code: ${{ steps.filter.outputs.code }}
      docker: ${{ steps.filter.outputs.docker }}
    steps:
      - name: Check for code changes
        id: filter
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            CHANGED=$(gh pr view ${{ github.event.pull_request.number }} --repo ${{ github.repository }} --json files --jq '.files[].path')
          else
            CHANGED=$(gh api repos/${{ github.repository }}/commits/${{ github.sha }} --jq '.files[].filename')
          fi
          echo "Changed files:"; echo "$CHANGED"
          CODE=false; DOCKER=false
          while IFS= read -r file; do
            [[ -z "$file" ]] && continue
            case "$file" in
              Dockerfile | .dockerignore | package.json | package-lock.json | next.config.js | next.config.mjs | next.config.ts)
                DOCKER=true ;;
            esac
            [[ "$file" == *.md ]] && continue
            [[ "$file" == .context/* ]] && continue
            [[ "$file" == .instructions/* ]] && continue
            [[ "$file" == LICENSE ]] && continue
            CODE=true
          done <<< "$CHANGED"
          echo "code=$CODE" >> "$GITHUB_OUTPUT"
          echo "docker=$DOCKER" >> "$GITHUB_OUTPUT"

  # ---- Static checks: parallel, no database ----
  typecheck:
    name: Type check
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.code == 'true'
    env:
      DATABASE_URL: 'postgresql://postgres:postgres@localhost:5432/sunrise_ci'
      NODE_OPTIONS: '--max-old-space-size=5120'
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with: { node-version: '20', cache: 'npm' }
      - uses: actions/cache@v4
        with:
          path: |
            .next/cache
            tsconfig.tsbuildinfo
          key: build-cache-${{ runner.os }}-${{ hashFiles('package-lock.json') }}-${{ github.sha }}
          restore-keys: |
            build-cache-${{ runner.os }}-${{ hashFiles('package-lock.json') }}-
            build-cache-${{ runner.os }}-
      - run: npm ci
      - run: npm run type-check

  lint:
    name: Lint
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.code == 'true'
    env:
      DATABASE_URL: 'postgresql://postgres:postgres@localhost:5432/sunrise_ci'
      NODE_OPTIONS: '--max-old-space-size=5120'
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with: { node-version: '20', cache: 'npm' }
      - uses: actions/cache@v4
        with:
          path: |
            .next/cache
            tsconfig.tsbuildinfo
          key: build-cache-${{ runner.os }}-${{ hashFiles('package-lock.json') }}-${{ github.sha }}
          restore-keys: |
            build-cache-${{ runner.os }}-${{ hashFiles('package-lock.json') }}-
            build-cache-${{ runner.os }}-
      - run: npm ci
      - run: npm run lint
      - run: npm run format:check

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.code == 'true'
    env:
      DATABASE_URL: 'postgresql://postgres:postgres@localhost:5432/sunrise_ci'
      BETTER_AUTH_SECRET: 'ci-build-secret-not-for-production-use'
      BETTER_AUTH_URL: 'http://localhost:3000'
      NEXT_PUBLIC_APP_URL: 'http://localhost:3000'
      NODE_OPTIONS: '--max-old-space-size=5120'
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with: { node-version: '20', cache: 'npm' }
      - uses: actions/cache@v4
        with:
          path: |
            .next/cache
            tsconfig.tsbuildinfo
          key: build-cache-${{ runner.os }}-${{ hashFiles('package-lock.json') }}-${{ github.sha }}
          restore-keys: |
            build-cache-${{ runner.os }}-${{ hashFiles('package-lock.json') }}-
            build-cache-${{ runner.os }}-
      - run: npm ci
      - run: npm run build

  # ---- Tests: 4-way shard matrix, each with its own Postgres ----
  test:
    name: Test (shard ${{ matrix.shard }}/4)
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.code == 'true'
    strategy:
      fail-fast: false
      matrix:
        shard: [1, 2, 3, 4]
    services:
      postgres:
        image: pgvector/pgvector:pg15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: sunrise_ci
        ports: ['5432:5432']
        options: >-
          --health-cmd pg_isready --health-interval 10s
          --health-timeout 5s --health-retries 5
    env:
      DATABASE_URL: 'postgresql://postgres:postgres@localhost:5432/sunrise_ci'
      BETTER_AUTH_SECRET: 'ci-build-secret-not-for-production-use'
      BETTER_AUTH_URL: 'http://localhost:3000'
      NEXT_PUBLIC_APP_URL: 'http://localhost:3000'
      NODE_OPTIONS: '--max-old-space-size=5120'
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with: { node-version: '20', cache: 'npm' }
      - run: npm ci
      - run: npm run db:migrate:deploy
      - run: npm run db:seed
      # EXPERIMENT: forced full suite, sharded. Production design keeps
      # --changed on PRs and shards only the full-suite/main path.
      - run: npx vitest run --shard=${{ matrix.shard }}/4

  smoke:
    name: Smoke — erasure
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.code == 'true'
    services:
      postgres:
        image: pgvector/pgvector:pg15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: sunrise_ci
        ports: ['5432:5432']
        options: >-
          --health-cmd pg_isready --health-interval 10s
          --health-timeout 5s --health-retries 5
    env:
      DATABASE_URL: 'postgresql://postgres:postgres@localhost:5432/sunrise_ci'
      BETTER_AUTH_SECRET: 'ci-build-secret-not-for-production-use'
      BETTER_AUTH_URL: 'http://localhost:3000'
      NEXT_PUBLIC_APP_URL: 'http://localhost:3000'
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with: { node-version: '20', cache: 'npm' }
      - run: npm ci
      - run: npm run db:migrate:deploy
      - run: npm run db:seed
      - run: npx tsx scripts/smoke/erasure.ts

  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: changes
    if: >-
      needs.changes.outputs.code == 'true' &&
      (github.event_name == 'push' || needs.changes.outputs.docker == 'true')
    steps:
      - uses: actions/checkout@v6
      - uses: docker/setup-buildx-action@v4
      - uses: docker/build-push-action@v7
        with:
          context: .
          push: false
          tags: sunrise:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            DATABASE_URL=postgresql://postgres:postgres@localhost:5432/sunrise
            BETTER_AUTH_URL=http://localhost:3000
            BETTER_AUTH_SECRET=ci-build-secret-not-for-production-use
            NEXT_PUBLIC_APP_URL=http://localhost:3000

  ci-status:
    name: CI Status
    runs-on: ubuntu-latest
    needs: [typecheck, lint, build, test, smoke, docker]
    if: always()
    steps:
      - name: Check CI result
        run: |
          for r in "${{ needs.typecheck.result }}" "${{ needs.lint.result }}" \
                   "${{ needs.build.result }}" "${{ needs.test.result }}" \
                   "${{ needs.smoke.result }}" "${{ needs.docker.result }}"; do
            if [[ "$r" == "failure" ]]; then echo "CI failed"; exit 1; fi
          done
          echo "CI passed (jobs succeeded or were skipped)"
